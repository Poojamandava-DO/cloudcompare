name: Build and Deploy CloudCompare

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Login to DigitalOcean Container Registry
        run: doctl registry login --expiry-seconds 600

      - name: Build Docker image
        run: docker build --platform linux/amd64 -t registry.digitalocean.com/cloudcompare-registry/cloudcompare:latest .

      - name: Push Docker image to DOCR
        run: docker push registry.digitalocean.com/cloudcompare-registry/cloudcompare:latest

      - name: Save DOKS kubeconfig
        run: doctl kubernetes cluster kubeconfig save cloudcompare-cluster

      - name: Deploy to DOKS
        run: |
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/hpa.yaml

      - name: Verify deployment
        run: kubectl rollout status deployment/cloudcompare -n cloudcompare
